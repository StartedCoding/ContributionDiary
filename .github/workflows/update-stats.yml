name: Update Stats & Profiles

on:
  push:
    paths:
      - "entries/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Parse all entries
        run: node scripts/parse-entries.js

      - name: Update README stats
        run: node scripts/update-readme.js

      - name: Generate per-user profiles
        run: node scripts/generate-profiles.js

      - name: Build GitHub Pages dashboard
        run: node scripts/build-dashboard.js

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "ContributionDiary Bot"
          git add README.md entries/**/PROFILE.md docs/
          git diff --staged --quiet || git commit -m "chore: auto-update stats and profiles [skip ci]"
          git push

  deploy-pages:
    needs: update-stats
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
